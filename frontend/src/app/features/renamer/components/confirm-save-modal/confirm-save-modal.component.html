<div class="confirm-modal">
  <div class="confirm-modal__header">
    <mat-icon class="confirm-modal__icon">drive_file_rename_outline</mat-icon>
    <h2 class="confirm-modal__title">Confirm Rename</h2>
  </div>

  <div class="confirm-modal__body">
    <p class="confirm-modal__message">
      You are about to rename
      <strong>{{ data.mappingCount }} file{{ data.mappingCount !== 1 ? 's' : '' }}</strong>
      in the following folder:
    </p>
    <div class="confirm-modal__path">
      <mat-icon>folder</mat-icon>
      <span>{{ data.folderPath }}</span>
    </div>
    <p class="confirm-modal__warning">
      <mat-icon>warning_amber</mat-icon>
      This operation modifies files on disk. Ensure your mappings are correct before proceeding.
    </p>
  </div>

  <div class="confirm-modal__actions">
    <button mat-button (click)="cancel()" class="confirm-modal__btn-cancel">
      Cancel
    </button>
    <button mat-flat-button color="warn" (click)="confirm()" class="confirm-modal__btn-confirm">
      <mat-icon>check</mat-icon>
      Yes, Rename Files
    </button>
  </div>
</div>
